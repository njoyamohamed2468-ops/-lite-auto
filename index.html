<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Auto - Excellence Automobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-bold text-blue-900">ELITE<span class="text-blue-600">AUTO</span></div>
        <a href="https://wa.me/237600000000" class="bg-green-500 text-white px-4 py-2 rounded-full font-bold">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </nav>

    <header class="bg-slate-900 text-white py-20 text-center px-4">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4">L'Excellence à votre portée</h1>
        <p class="text-xl text-gray-300">Véhicules révisés et garantis 24 mois</p>
    </header>

    <main class="max-w-6xl mx-auto py-12 px-4">
        <h2 class="text-3xl font-bold mb-8 border-b-2 border-blue-600 inline-block">Nos arrivages récents</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
                <div class="p-6">
                    <span class="text-blue-600 font-bold">Toyota</span>
                    <h3 class="text-xl font-bold">RAV4 Hybride</h3>
                    <p class="text-gray-500 mt-2">Année : 2022 | 45,000 km</p>
                    <button class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Voir le stock</button>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
                <div class="p-6">
                    <span class="text-blue-600 font-bold">Range Rover</span>
                    <h3 class="text-xl font-bold">Velar D300</h3>
                    <p class="text-gray-500 mt-2">Année : 2021 | 32,000 km</p>
                    <button class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Voir le stock</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
